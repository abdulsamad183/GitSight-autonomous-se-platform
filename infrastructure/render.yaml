# Render Blueprint — Backend API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: gitsight-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health/ready
    preDeployCommand: uv run alembic upgrade head
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: EMBEDDING_BATCH_SIZE
        value: "8"
      - key: EMBEDDING_THREADS
        value: "1"
      - key: MAX_BRANCHES_TO_ANALYZE
        value: "1"
